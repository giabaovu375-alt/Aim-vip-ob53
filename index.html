<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP DOWNLOAD PAGE</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0000, #000);
    color:white;
    text-align:center;
}

/* BOX CHÍNH */
.container{
    max-width:420px;
    margin:30px auto;
    padding:20px;
    background: rgba(20,20,20,0.9);
    border:1px solid #ff0000;
    border-radius:15px;
    box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid red;
    box-shadow:0 0 20px red;
    object-fit:cover;
}

/* TITLE */
h1{
    color:red;
    font-size:22px;
    margin:10px 0;
}

/* BUTTON */
.btn{
    display:block;
    margin-top:15px;
    padding:14px;
    background:linear-gradient(90deg, #ff0000, #990000);
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
    transition:0.2s;
}
.btn:hover{
    transform:scale(1.03);
}

/* QR */
.qr{
    margin-top:20px;
    padding:10px;
    background:#111;
    border:1px dashed red;
    border-radius:10px;
}

.small{
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

    <!-- AVATAR -->
    <img class="avatar" src="https://i.imgur.com/your-avatar.jpg">

    <h1>⚡ AIM VIP OB53 ⚡</h1>
    <div class="small">Map / Tool / File Center</div>

    <!-- NÚT TẢI -->
    <a class="btn" href="https://link4m.com/2vTNml">DOWNLOAD AIM VIP</a>

    <!-- QR DONATE -->
    <div class="qr">
        <p style="color:red;font-weight:bold;"> DONATE Cho tui ít đê , bạn sợ à</p>
        <img width="180" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=AGRIBANK-1420205146778-VU-PHUONG-ANH">
        <div class="small">Agribank • Vu Phuong Anh</div>
    </div>

</div>

</body>
</html>
